# Project Knowledge — set-core orchestration context
# version: 1
#
# This file provides project-specific knowledge to the orchestrator:
# - cross_cutting_files: files touched by multiple features (merge hazards)
# - features: domain-specific feature mappings for context injection
# - verification_rules: automated checks triggered by file path patterns
#
# Generated via: set-project init-knowledge
# Edit manually to refine after initial scan.

version: 1

# Files that multiple features touch — orchestrator uses these for
# merge hazard detection and scope overlap warnings in planning.
cross_cutting_files:
  # Example entries (uncomment and adapt):
  # - path: src/components/Sidebar.tsx
  #   description: Navigation sidebar — most features add entries here
  # - path: src/i18n/en.json
  #   description: English translations — every user-facing feature adds keys
  # - path: src/routes.ts
  #   description: Route definitions — new pages register routes here
  # - path: src/db/schema.prisma
  #   description: Database schema — schema changes affect multiple features

# Feature registry — maps logical features to their file scopes,
# used for targeted context injection at dispatch time.
features:
  # Example:
  # dashboard:
  #   touches:
  #     - src/pages/Dashboard.tsx
  #     - src/components/dashboard/
  #   description: Main dashboard page with widgets
  #   reference_impl: false

# Verification rules — triggered by git diff file patterns after tests pass.
# Errors block merge, warnings are logged.
verification_rules:
  # Example:
  # - name: i18n-completeness
  #   trigger: "src/i18n/*.json"
  #   check: "all language files have same keys"
  #   severity: error
  # - name: sidebar-order
  #   trigger: "src/components/Sidebar.tsx"
  #   check: "sidebar items are in alphabetical order"
  #   severity: warning

# Merge strategies — file-type-aware merge protection.
# Controls how set-merge handles LLM-resolved conflicts for specific files.
# Strategy types:
#   additive — entity counting + conservation check + optional validation
#   llm_with_conservation — generic conservation check only (default for all files)
merge_strategies:
  # Example for Prisma projects:
  # - name: schema
  #   patterns: ["prisma/schema.prisma", "*.prisma"]
  #   strategy: additive
  #   entity_pattern: "^model |^enum "
  #   validate_command: "npx prisma validate"
  #   llm_hint: "Database schema. NEVER remove models, enums, or fields. Keep ALL from both sides."
  # - name: middleware
  #   patterns: ["src/middleware.ts"]
  #   strategy: additive
  #   entity_pattern: "^export |matcher"
  #   llm_hint: "Route middleware. Keep ALL route matchers and exports from both sides."
