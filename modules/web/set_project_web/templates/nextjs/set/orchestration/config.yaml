# Orchestration config — web project defaults
# Customize per project. Profile auto-detects test/e2e/build commands if omitted.

# Model for implementation agents (sonnet|opus|opus-1m)
default_model: opus

# Commands — override profile auto-detection if needed
# test_command: pnpm test
# e2e_command: npx playwright test
# build_command: npx next build

# Parallelism
max_parallel: 1

# Quality gates
review_before_merge: true
max_verify_retries: 2

# LLM verdict classifier — second Sonnet pass that reads review/spec-verify
# output and extracts a structured verdict. Defends against silent gate
# passes where the primary LLM emits findings in a format the body-regex
# parser does not recognise (observed twice in 2026-04 retry reviews).
# Default True; set to False to disable the extra Sonnet call if cost is a
# concern (at the price of reopening the silent-pass window).
# llm_verdict_classifier_enabled: true

# Replanning
auto_replan: true
max_replan_cycles: 2

# E2E
# 600s default — a realistic web suite (100+ tests, Prisma seed, Next.js dev
# cold start) runs in ~150s on dev hardware. 600s gives ~4x headroom for
# slower CI runners and test count growth. The e2e gate's timeout guard
# clause surfaces timeouts as explicit FAILs (no more silent masking), so a
# value that is too low just wastes wall time instead of hiding regressions.
e2e_timeout: 600

# Environment variables injected into every worktree .env
env_vars:
  DATABASE_URL: "file:./dev.db"

# Discord notifications — webhook (no set-web needed)
# Get webhook URL: Discord server → channel settings → Integrations → Webhooks → New
# discord:
#   webhook_url: "https://discord.com/api/webhooks/YOUR_ID/YOUR_TOKEN"
#   channel_name: my-project
