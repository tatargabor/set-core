# Orchestration config — SPA project defaults
# Customize per project. Profile auto-detects test/e2e/build commands if omitted.

# Model for implementation agents (sonnet|opus|opus-1m)
default_model: sonnet

# Commands — override profile auto-detection if needed
# test_command: pnpm test
# e2e_command: npx playwright test
# build_command: pnpm build

# Parallelism
max_parallel: 2

# Quality gates
review_before_merge: true
max_verify_retries: 2

# Replanning
auto_replan: true
max_replan_cycles: 2

# E2E
e2e_timeout: 120

# Environment variables injected into every worktree .env
env_vars:
  DATABASE_URL: "file:./dev.db"

# Discord notifications — webhook (no set-web needed)
# Get webhook URL: Discord server → channel settings → Integrations → Webhooks → New
# discord:
#   webhook_url: "https://discord.com/api/webhooks/YOUR_ID/YOUR_TOKEN"
#   channel_name: my-project
